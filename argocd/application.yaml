apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: patient-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/desbain/patient-management-system
    targetRevision: HEAD
    path: helm/patient-system
  destination:
    server: https://kubernetes.default.svc
    namespace: patient-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
