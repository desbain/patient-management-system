services:
  app:
    build: ./app
    container_name: patient_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: secret123
      DB_NAME: patientdb
      SESSION_SECRET: superSecretPatientSystem2024
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: patient_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: patientdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
